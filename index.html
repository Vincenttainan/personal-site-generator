<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>個人網頁生成器</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/editor.css" />
    <link rel="stylesheet" href="css/preview.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

    <header class="app-header">
        <h1>個人網頁視覺化生成器</h1>
        <p>輸入資料後，右側會即時產生個人網頁預覽。</p>
    </header>

    <main class="builder">

        <section class="editor-panel">
            <h2>編輯資料</h2>

            <div id="storageControlsContainer"></div>

            <div id="templateControlsContainer"></div>

            <div class="form-group">
                <details class="editor-accordion">
                    <summary class="accordion-title">
                        <span>內容調整</span>
                        <span class="accordion-icon">＋</span>
                    </summary>

                    <div class="accordion-content">
                        <div id="globalControlsContainer"></div>

                        <div id="editorFieldsContainer"></div>
                    </div>
                </details>
            </div>

            <div id="contactControlsContainer"></div>
        </section>

        <section class="preview-panel">
            <div class="preview-header">
                <h2>即時預覽</h2>

                <div class="preview-actions">
                    <h>輸入檔名</h>

                    <input 
                        type="text" 
                        id="downloadFileNameInput" 
                        class="download-name-input"
                        value="portfolio-website"
                        placeholder="輸入檔名"
                    >

                    <button id="previewWebsiteBtn" type="button">預覽網頁</button>

                    <button id="downloadBtn" type="button">下載 ZIP</button>
                </div>
            </div>

            <div class="preview-area">
                <section class="profile-card">
                    <div class="avatar" id="avatarPreview"></div>

                    <div class="profile-content">
                        <p class="subheading" id="subheadingPreview"></p>

                        <h1 id="namePreview"></h1>

                        <h2 id="titlePreview"></h2>

                        <p class="intro" id="introPreview"></p>

                        <div class="skills" id="skillsPreview"></div>

                        <div class="contact-links" id="contactLinksPreview"></div>
                    </div>
                </section>
            </div>
        </section>

    </main>

    <div class="floating-color-modal" id="floatingColorModal">
        <div class="floating-modal-header" id="floatingModalHeader">
            <span id="floatingModalTitle">選擇顏色</span>
            <button id="floatingModalClose">X</button>
        </div>

        <div class="floating-modal-body">
            <div class="color-grid" id="colorGrid"></div>

            <div class="color-preview-box" id="colorPreviewBox">
                <span id="colorPreviewText">#222222</span>
            </div>

            <div class="hex-input-row">
                <label for="hexColorInput">色號</label>
                <input type="text" id="hexColorInput" value="#222222" maxlength="7">
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="data.js"></script>
    <script src="template.js"></script>

    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/templateControls.js"></script>
    <script src="js/avatarControls.js"></script>
    <script src="js/contactControls.js"></script>
    <script src="js/colorModal.js"></script>
    <script src="js/fontSizeControls.js"></script>
    <script src="js/download.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
